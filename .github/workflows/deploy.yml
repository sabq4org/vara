name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) VARA Edge API (Hono) → Cloudflare Worker
  deploy-edge:
    name: Deploy edge API
    runs-on: ubuntu-latest
    outputs:
      edge_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Deploy worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: deploy
          secrets: |
            SPORTMONKS_API_TOKEN
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}

  # 2) Web app (Next.js via OpenNext) → Cloudflare Worker
  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs: deploy-edge
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build (OpenNext)
        working-directory: web
        run: bunx opennextjs-cloudflare build

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: deploy
          # VARA_EDGE_URL is the edge worker URL. Prefer the repo variable (e.g. a
          # custom domain); otherwise fall back to the URL just deployed above.
          secrets: |
            VARA_EDGE_URL
        env:
          VARA_EDGE_URL: ${{ vars.VARA_EDGE_URL || needs.deploy-edge.outputs.edge_url }}
